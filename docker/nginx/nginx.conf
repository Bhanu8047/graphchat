events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3001;
  }

  upstream web {
    server web:3000;
  }

  # Internal-only — graph sidecar is reachable from the API container,
  # never exposed publicly. Defined here so future internal routes can
  # reference it via `proxy_pass http://graph;` without further edits.
  upstream graph {
    server graph-service:5000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Default servers: any request whose Host header is not one of the
  # explicitly listed server_names below (e.g. spoof domains pointing DNS at
  # this VPS, bare IP scans) is dropped without ever reaching the app.
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
  }

  server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/graphchat.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graphchat.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    return 444;
  }

  server {
    listen 80;
    server_name graphchat.co api.graphchat.co;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name graphchat.co;

    ssl_certificate /etc/letsencrypt/live/graphchat.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graphchat.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name api.graphchat.co;

    ssl_certificate /etc/letsencrypt/live/graphchat.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/graphchat.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
