name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_DIR: /opt/trchat

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Derive image names
        id: images
        run: |
          repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "api=${REGISTRY}/${repository}-api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web=${REGISTRY}/${repository}-web:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.web }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://trchat.co
            NEXT_PUBLIC_API_URL=https://api.trchat.co/api

      - name: Create production env file
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          : "${PROD_ENV_FILE:?PROD_ENV_FILE secret is required}"
          printf '%s\n' "$PROD_ENV_FILE" > .env.prod

      - name: Prepare deployment bundle
        run: |
          tar -czf /tmp/trchat-deploy.tgz \
            docker-compose.prod.yml \
            docker/nginx \
            scripts/vps \
            .env.prod

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USER:?VPS_USER secret is required}"
          : "${VPS_SSH_KEY:?VPS_SSH_KEY secret is required}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/trchat_deploy_key
          chmod 600 ~/.ssh/trchat_deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/trchat_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "mkdir -p '${DEPLOY_DIR}'"
          scp -i ~/.ssh/trchat_deploy_key -P "${VPS_PORT:-22}" /tmp/trchat-deploy.tgz "$VPS_USER@$VPS_HOST:${DEPLOY_DIR}/trchat-deploy.tgz"
          ssh -i ~/.ssh/trchat_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "cd '${DEPLOY_DIR}' && tar -xzf trchat-deploy.tgz && chmod 600 .env.prod && chmod +x scripts/vps/*.sh"

      - name: Deploy exact images
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          API_IMAGE: ${{ steps.images.outputs.api }}
          WEB_IMAGE: ${{ steps.images.outputs.web }}
        run: |
          ssh -i ~/.ssh/trchat_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "cd '${DEPLOY_DIR}' && echo '${{ github.token }}' | docker login '${REGISTRY}' -u '${{ github.actor }}' --password-stdin && API_IMAGE='${API_IMAGE}' WEB_IMAGE='${WEB_IMAGE}' ./scripts/vps/deploy.sh"

      - name: Verify public endpoints
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 https://trchat.co >/dev/null
          curl --fail --silent --show-error --retry 12 --retry-delay 5 https://api.trchat.co/api/health
