name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'graph-service/**'
      - 'libs/ai/**'
      - 'libs/shared-types/**'
      - 'libs/vector-client/**'
      - 'docker/api.Dockerfile'
      - 'docker/web.Dockerfile'
      - 'docker/graph-service.Dockerfile'
      - 'docker/nginx/**'
      - 'docker-compose.prod.yml'
      - 'scripts/vps/deploy.sh'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - 'nx.json'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_DIR: /opt/graphchat

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deploy scope
        id: changes
        run: |
          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${head}^" >/dev/null 2>&1; then
              base="$(git rev-parse "${head}^")"
            else
              base="$head"
            fi
          fi

          mapfile -t changed_files < <(git diff --name-only "$base" "$head")
          if [ ${#changed_files[@]} -eq 0 ]; then
            mapfile -t changed_files < <(git ls-tree --name-only -r "$head")
          fi

          api_changed=false
          web_changed=false
          graph_service_changed=false
          full_redeploy=false
          nginx_changed=false

          printf 'Changed files between %s and %s:\n' "$base" "$head"
          printf '  %s\n' "${changed_files[@]}"

          for file in "${changed_files[@]}"; do
            case "$file" in
              apps/api/*|libs/ai/*|libs/vector-client/*|docker/api.Dockerfile)
                api_changed=true
                ;;
              apps/web/*|docker/web.Dockerfile)
                web_changed=true
                ;;
              graph-service/*|docker/graph-service.Dockerfile)
                graph_service_changed=true
                ;;
              libs/shared-types/*|package.json|package-lock.json|tsconfig.base.json|tsconfig.json|nx.json)
                api_changed=true
                web_changed=true
                ;;
              docker/nginx/*)
                nginx_changed=true
                ;;
              docker-compose.prod.yml|scripts/vps/deploy.sh)
                full_redeploy=true
                ;;
            esac
          done

          build_images=false
          should_deploy=false
          deploy_services=''

          # A full redeploy must rebuild all images so new services (like graph-service)
          # get an image even if their source files were not part of this commit.
          if [ "$full_redeploy" = true ]; then
            api_changed=true
            web_changed=true
            graph_service_changed=true
          fi

          if [ "$api_changed" = true ] || [ "$web_changed" = true ] || [ "$graph_service_changed" = true ]; then
            build_images=true
            should_deploy=true
          fi

          if [ "$nginx_changed" = true ] || [ "$full_redeploy" = true ]; then
            should_deploy=true
          fi

          if [ "$full_redeploy" = false ]; then
            deploy_targets=()

            if [ "$api_changed" = true ]; then
              deploy_targets+=(api)
            fi

            if [ "$web_changed" = true ]; then
              deploy_targets+=(web)
            fi

            if [ "$graph_service_changed" = true ]; then
              deploy_targets+=(graph-service)
            fi

            if [ "$nginx_changed" = true ]; then
              deploy_targets+=(nginx)
            fi

            if [ ${#deploy_targets[@]} -gt 0 ]; then
              deploy_services="${deploy_targets[*]}"
            fi
          fi

          echo "api_changed=$api_changed" >> "$GITHUB_OUTPUT"
          echo "web_changed=$web_changed" >> "$GITHUB_OUTPUT"
          echo "graph_service_changed=$graph_service_changed" >> "$GITHUB_OUTPUT"
          echo "build_images=$build_images" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "full_redeploy=$full_redeploy" >> "$GITHUB_OUTPUT"
          echo "deploy_services=$deploy_services" >> "$GITHUB_OUTPUT"

      - name: Summarize deploy scope
        run: |
          {
            echo '## Deploy Scope'
            echo
            echo "- API changed: ${{ steps.changes.outputs.api_changed }}"
            echo "- Web changed: ${{ steps.changes.outputs.web_changed }}"
            echo "- Graph service changed: ${{ steps.changes.outputs.graph_service_changed }}"
            echo "- Build images: ${{ steps.changes.outputs.build_images }}"
            echo "- Should deploy: ${{ steps.changes.outputs.should_deploy }}"
            echo "- Full redeploy: ${{ steps.changes.outputs.full_redeploy }}"

            if [ -n "${{ steps.changes.outputs.deploy_services }}" ]; then
              echo "- Target services: ${{ steps.changes.outputs.deploy_services }}"
            else
              echo '- Target services: all services managed by compose'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: docker/setup-buildx-action@v3
        if: steps.changes.outputs.build_images == 'true'

      - name: Derive image names
        id: images
        run: |
          repository="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "api=${REGISTRY}/${repository}-api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web=${REGISTRY}/${repository}-web:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "graph_service=${REGISTRY}/${repository}-graph-service:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        if: steps.changes.outputs.build_images == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v6
        if: steps.changes.outputs.api_changed == 'true'
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api }}

      - uses: docker/build-push-action@v6
        if: steps.changes.outputs.web_changed == 'true'
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.web }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://graphchat.co
            NEXT_PUBLIC_API_URL=https://api.graphchat.co/api

      - uses: docker/build-push-action@v6
        if: steps.changes.outputs.graph_service_changed == 'true'
        with:
          context: .
          file: docker/graph-service.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.graph_service }}

      - name: Create production env file
        if: steps.changes.outputs.should_deploy == 'true'
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          : "${PROD_ENV_FILE:?PROD_ENV_FILE secret is required}"
          printf '%s\n' "$PROD_ENV_FILE" > .env.prod

      - name: Prepare deployment bundle
        if: steps.changes.outputs.should_deploy == 'true'
        run: |
          tar -czf /tmp/graphchat-deploy.tgz \
            docker-compose.prod.yml \
            docker/nginx \
            scripts/vps/deploy.sh \
            .env.prod

      - name: Configure SSH
        if: steps.changes.outputs.should_deploy == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USER:?VPS_USER secret is required}"
          : "${VPS_SSH_KEY:?VPS_SSH_KEY secret is required}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/graphchat_deploy_key
          chmod 600 ~/.ssh/graphchat_deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        if: steps.changes.outputs.should_deploy == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/graphchat_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "mkdir -p '${DEPLOY_DIR}'"
          scp -i ~/.ssh/graphchat_deploy_key -P "${VPS_PORT:-22}" /tmp/graphchat-deploy.tgz "$VPS_USER@$VPS_HOST:${DEPLOY_DIR}/graphchat-deploy.tgz"
          ssh -i ~/.ssh/graphchat_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" "cd '${DEPLOY_DIR}' && tar -xzf graphchat-deploy.tgz && chmod 600 .env.prod && chmod +x scripts/vps/deploy.sh"

      - name: Deploy exact images
        if: steps.changes.outputs.should_deploy == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          remote_env=()

          if [ "${{ steps.changes.outputs.api_changed }}" = 'true' ]; then
            remote_env+=("API_IMAGE='${{ steps.images.outputs.api }}'")
          fi

          if [ "${{ steps.changes.outputs.web_changed }}" = 'true' ]; then
            remote_env+=("WEB_IMAGE='${{ steps.images.outputs.web }}'")
          fi

          if [ "${{ steps.changes.outputs.graph_service_changed }}" = 'true' ]; then
            remote_env+=("GRAPH_SERVICE_IMAGE='${{ steps.images.outputs.graph_service }}'")
          fi

          if [ -n "${{ steps.changes.outputs.deploy_services }}" ]; then
            remote_env+=("DEPLOY_SERVICES='${{ steps.changes.outputs.deploy_services }}'")
          fi

          remote_prefix=''
          if [ ${#remote_env[@]} -gt 0 ]; then
            remote_prefix="${remote_env[*]} "
          fi

          ssh -i ~/.ssh/graphchat_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "cd '${DEPLOY_DIR}' && echo '${{ github.token }}' | docker login '${REGISTRY}' -u '${{ github.actor }}' --password-stdin && ${remote_prefix}./scripts/vps/deploy.sh"

      - name: Verify public endpoints
        if: steps.changes.outputs.should_deploy == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -uo pipefail

          # Follow redirects (middleware may 308 on host mismatch), bound each
          # attempt at 30s, and retry for ~3 min total to absorb Next.js cold
          # starts after container recreation.
          verify() {
            local url="$1"
            curl --fail --location --silent --show-error \
                 --retry 36 --retry-delay 5 --retry-all-errors \
                 --max-time 30 \
                 -o /dev/null -w 'HTTP %{http_code} in %{time_total}s\n' \
                 "$url"
          }

          fail=0
          for url in https://graphchat.co https://api.graphchat.co/api/health; do
            echo "Verifying ${url}…"
            if ! verify "$url"; then
              fail=1
              echo "::error::${url} did not return 2xx after retries"
              # Diagnostic dump: response headers + remote container logs.
              curl --location --silent --show-error --max-time 15 \
                   -D - -o /dev/null "$url" || true
              ssh -i ~/.ssh/graphchat_deploy_key -p "${VPS_PORT:-22}" \
                  "$VPS_USER@$VPS_HOST" \
                  "cd '${DEPLOY_DIR}' && docker compose --env-file .env.prod --env-file .deploy/current.env -f docker-compose.prod.yml ps && docker compose --env-file .env.prod --env-file .deploy/current.env -f docker-compose.prod.yml logs --tail=80 nginx api web" \
                  || true
            fi
          done

          exit "$fail"
