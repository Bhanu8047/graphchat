name: CI

on:
  pull_request:
    branches:
      - dev
    types:
      - closed

permissions:
  actions: read
  contents: read

jobs:
  main:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Derive affected SHAs
        id: shas
        run: |
          if [ -n "${{ github.event.pull_request.merge_commit_sha }}" ]; then
            head="${{ github.event.pull_request.merge_commit_sha }}"
            if git rev-parse "${head}^" >/dev/null 2>&1; then
              base="$(git rev-parse "${head}^")"
            else
              base="$head"
            fi
          else
            head="${{ github.sha }}"
            if git rev-parse "${head}^" >/dev/null 2>&1; then
              base="$(git rev-parse "${head}^")"
            else
              base="$head"
            fi
          fi

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse "${head}^" >/dev/null 2>&1; then
              base="$(git rev-parse "${head}^")"
            else
              base="$head"
            fi
          fi

          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck affected projects
        run: npm exec -- nx affected -t typecheck --exclude=web --base="${{ steps.shas.outputs.base }}" --head="${{ steps.shas.outputs.head }}" --outputStyle=static

      - name: Build affected apps
        env:
          NEXT_PUBLIC_APP_URL: https://trchat.co
          NEXT_PUBLIC_API_URL: https://api.trchat.co/api
        run: npm exec -- nx affected -t build --exclude=ai,shared-types,vector-client --base="${{ steps.shas.outputs.base }}" --head="${{ steps.shas.outputs.head }}" --outputStyle=static
