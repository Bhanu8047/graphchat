name: graphchat

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: graphchat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - /etc/letsencrypt:/etc/letsencrypt:ro,z
      - ./certbot/www:/var/www/certbot:ro,z
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    container_name: graphchat-api
    env_file: .env.prod
    environment:
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}:${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}@mongo:27017/${MONGO_INITDB_DATABASE:-vectorgraph}?authSource=admin
      REDIS_URL: redis://redis:6379
      WEB_URL: ${WEB_URL:-https://graphchat.co,https://www.graphchat.co}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    container_name: graphchat-web
    env_file: .env.prod
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      INTERNAL_API_URL: http://api:3001/api
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://graphchat.co}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.graphchat.co/api}
      APP_SESSION_COOKIE_DOMAIN: ${APP_SESSION_COOKIE_DOMAIN:-.graphchat.co}
      APP_TRUSTED_HOSTS: ${APP_TRUSTED_HOSTS:-graphchat.co,www.graphchat.co}
      APP_CANONICAL_HOST: ${APP_CANONICAL_HOST:-graphchat.co}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:7.4.0-v8
    container_name: graphchat-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: graphchat-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-vectorgraph}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:z
      - ./certbot/www:/var/www/certbot:z
    profiles: ["certbot"]

  graph-service:
    image: ${GRAPH_SERVICE_IMAGE:?GRAPH_SERVICE_IMAGE is required}
    container_name: graphchat-graph-service
    env_file: .env.prod
    environment:
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}:${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}@mongo:27017/${MONGO_INITDB_DATABASE:-vectorgraph}?authSource=admin
      REDIS_URL: redis://redis:6379
    volumes:
      - repo_data:/repos
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: always

volumes:
  redis_data:
  mongo_data:
  repo_data:
